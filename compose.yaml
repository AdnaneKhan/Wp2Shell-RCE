# Vulnerability research target: STOCK WordPress 7.0.0 (affected) + MySQL 8.0.
# NO plugin, NO special DB grants — a default install.
#
# The exploit (exploit.py) is the anonymous wp2shell pre-auth RCE chain:
# REST batch-route confusion (GHSA-ff9f-jf42-662q / CVE-2026-63030)
#   + author__not_in SQLi (GHSA-fpp7-x2x2-2mjf / CVE-2026-60137)
#   -> forged WP_Post object-cache poison -> oEmbed cache updater ->
#   customize_changeset publish (user_id identity switch) -> parse_request
#   re-entry -> new administrator -> plugin upload -> RCE.
# Needs NO MySQL FILE privilege, NO cracked password, NO victim interaction.
name: wpsqli

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpw
    volumes:
      # default init only (no FILE grant) — see init.sql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 3s
      timeout: 5s
      retries: 40

  wordpress:
    image: wordpress:7.0.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8888:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      # keep the lab pinned to the vulnerable release: never auto-update core
      WORDPRESS_CONFIG_EXTRA: |
        define('AUTOMATIC_UPDATER_DISABLED', true);
